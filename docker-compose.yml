services:
  api:
    build: .
    container_name: ynix_fastapi_core_api
    env_file:
      - .env
    environment:
      DB_CONNECTION: mysql
      DB_DRIVER: pymysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ynix_core
      DB_USERNAME: ynix
      DB_PASSWORD: ynix
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - redis
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  mysql:
    image: mysql:8.4
    container_name: ynix_fastapi_core_mysql
    environment:
      MYSQL_DATABASE: ynix_core
      MYSQL_USER: ynix
      MYSQL_PASSWORD: ynix
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  postgres:
    image: postgres:16
    container_name: ynix_fastapi_core_postgres
    profiles:
      - postgres
    environment:
      POSTGRES_DB: ynix_core
      POSTGRES_USER: ynix
      POSTGRES_PASSWORD: ynix
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ynix_fastapi_core_redis
    ports:
      - "6379:6379"

volumes:
  mysql_data:
  postgres_data:
